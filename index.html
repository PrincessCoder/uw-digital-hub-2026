<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://unpkg.com/aframe-particle-system-component@1.1.x/dist/aframe-particle-system-component.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; }
      #start-screen {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: black;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        gap: 30px;
      }
      #start-screen h1 {
        color: white;
        font-family: sans-serif;
        font-size: 22px;
        text-align: center;
        padding: 0 40px;
        font-weight: 300;
        letter-spacing: 0.05em;
      }
      #start-btn {
        padding: 18px 48px;
        font-size: 18px;
        background: white;
        color: black;
        border: none;
        border-radius: 50px;
        font-family: sans-serif;
        cursor: pointer;
        letter-spacing: 0.05em;
      }
      #status {
        color: rgba(255,255,255,0.7);
        font-family: sans-serif;
        font-size: 14px;
        text-align: center;
        padding: 0 40px;
        min-height: 40px;
      }
    </style>
  </head>
  <body>

    <a-scene
      mindar-image="imageTargetSrc: targets/artwork.mind; autoStart: false; filterMinCF: 0.001; filterBeta: 1000;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded>

      <a-assets>
        <img id="artwork" src="assets/artwork_target.png" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">

        <!-- Base artwork overlay -->
        <a-plane
          src="#artwork"
          position="0 0 0"
          height="1"
          width="1"
          material="transparent: true; alphaTest: 0.1">
        </a-plane>

        <!-- Soft pulsing glow layer -->
        <a-plane
          position="0 0 0.001"
          height="1.1"
          width="1.1"
          material="color: #a0d8ef; transparent: true; opacity: 0.15; shader: flat;">
          <a-animation
            attribute="material.opacity"
            from="0.05"
            to="0.25"
            dur="2000"
            direction="alternate"
            repeat="indefinite"
            easing="easeInOutSine">
          </a-animation>
        </a-plane>

        <!-- Warm golden glow layer -->
        <a-plane
          position="0 0 0.002"
          height="1.05"
          width="1.05"
          material="color: #f4c77a; transparent: true; opacity: 0.1; shader: flat;">
          <a-animation
            attribute="material.opacity"
            from="0.02"
            to="0.18"
            dur="3000"
            direction="alternate"
            repeat="indefinite"
            easing="easeInOutSine">
          </a-animation>
        </a-plane>

        <!-- Rising particles -->
        <a-entity
          position="0 0 0.01"
          particle-system="
            preset: default;
            particleCount: 80;
            color: #ffffff, #a0d8ef, #f4c77a;
            size: 0.015, 0.005;
            velocityValue: 0 0.15 0;
            velocitySpread: 0.1 0.05 0.05;
            accelerationValue: 0 0.02 0;
            maxAge: 3;
            maxAgeSpread: 1;
            opacity: 0.8;
            opacitySpread: 0.2;
            blending: additive;
            randomizePosition: true;
            positionSpread: 0.5 0.5 0;
          ">
        </a-entity>

      </a-entity>

    </a-scene>

    <div id="start-screen">
      <h1>Point your camera at the artwork to begin</h1>
      <button id="start-btn">Tap to Begin</button>
      <p id="status"> </p>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const btn = document.getElementById('start-btn');
        const statusEl = document.getElementById('status');
        const startScreen = document.getElementById('start-screen');
        const sceneEl = document.querySelector('a-scene');
        let arSystem;

        sceneEl.addEventListener('loaded', function() {
          arSystem = sceneEl.systems['mindar-image-system'];
        });

        sceneEl.addEventListener('arError', function() {
          statusEl.textContent = 'AR failed. Please try again.';
          btn.disabled = false;
          startScreen.style.display = 'flex';
        });

        btn.addEventListener('click', async function() {
          btn.disabled = true;
          statusEl.textContent = 'Requesting camera...';

          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: 'environment' }
            });
            stream.getTracks().forEach(t => t.stop());
          } catch(e) {
            statusEl.textContent = 'Camera denied. Go to Settings → Safari → Camera → Allow, then retry.';
            btn.disabled = false;
            return;
          }

          statusEl.textContent = 'Starting AR...';
          startScreen.style.display = 'none';

          if (arSystem) {
            arSystem.start();
          } else {
            sceneEl.addEventListener('loaded', function() {
              arSystem = sceneEl.systems['mindar-image-system'];
              if (arSystem) arSystem.start();
            });
          }
        });
      });
    </script>

  </body>
</html>
