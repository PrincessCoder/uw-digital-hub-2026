<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js">
    </script>
    <style>
      #start-button {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 20px 40px;
        font-size: 20px;
        background: white;
        border: 2px solid black;
        border-radius: 8px;
        cursor: pointer;
        z-index: 999;
      }
      #ar-container {
        display: none;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <button id="start-button">Tap to Begin</button>

    <div id="ar-container">
      <a-scene
        mindar-image="imageTargetSrc: targets/artwork.mind;"
        color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-assets>
          <img id="artwork" src="assets/artwork_target.png" />
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
          <a-plane
            src="#artwork"
            position="0 0 0"
            height="1"
            width="1"
            material="transparent: true; alphaTest: 0.1">
          </a-plane>
        </a-entity>

      </a-scene>
    </div>

    <script>
      document.getElementById('start-button').addEventListener('click', function() {
        this.style.display = 'none';
        document.getElementById('ar-container').style.display = 'block';
      });
    </script>

  </body>
</html>
