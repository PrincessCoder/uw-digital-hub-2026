<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { 
        background: black; 
        width: 100vw; 
        height: 100vh; 
        overflow: hidden;
      }
      #container {
        position: relative;
        width: 100%;
        height: 100%;
      }
      #start-screen {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: black;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        gap: 30px;
      }
      #start-screen h1 {
        color: white;
        font-family: sans-serif;
        font-size: 22px;
        text-align: center;
        padding: 0 40px;
        font-weight: 300;
        letter-spacing: 0.05em;
      }
      #start-btn {
        padding: 18px 48px;
        font-size: 18px;
        background: white;
        color: black;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        font-family: sans-serif;
        letter-spacing: 0.05em;
      }
      #status {
        color: rgba(255,255,255,0.6);
        font-family: sans-serif;
        font-size: 14px;
        text-align: center;
        padding: 0 40px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="container"></div>

    <div id="start-screen">
      <h1>Point your camera at the artwork to begin</h1>
      <button id="start-btn">Tap to Begin</button>
      <p id="status"></p>
    </div>

    <script>
      const btn = document.getElementById('start-btn');
      const status = document.getElementById('status');
      const startScreen = document.getElementById('start-screen');

      function showStatus(msg) {
        status.style.display = 'block';
        status.textContent = msg;
      }

      btn.addEventListener('click', async () => {
        btn.disabled = true;
        showStatus('Requesting camera access...');

        // Step 1: explicitly request camera from user gesture
        let stream;
        try {
          stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'environment' } 
          });
        } catch(e) {
          showStatus('Camera access denied. Please allow camera in Settings > Safari > Camera and try again.');
          btn.disabled = false;
          return;
        }

        // Step 2: stop the test stream — MindAR will open its own
        stream.getTracks().forEach(t => t.stop());
        showStatus('Starting AR experience...');

        // Step 3: initialize MindAR vanilla (no A-Frame)
        try {
          const mindarThree = new window.MINDAR.IMAGE.MindARThree({
            container: document.getElementById('container'),
            imageTargetSrc: 'targets/artwork.mind',
          });

          const { renderer, scene, camera } = mindarThree;

          // Load overlay image as a Three.js texture
          const texture = new THREE.TextureLoader().load('assets/artwork_target.png');
          const geometry = new THREE.PlaneGeometry(1, 1);
          const material = new THREE.MeshBasicMaterial({ 
            map: texture, 
            transparent: true,
            alphaTest: 0.1
          });
          const plane = new THREE.Mesh(geometry, material);

          // Attach to anchor (target index 0)
          const anchor = mindarThree.addAnchor(0);
          anchor.group.add(plane);

          // Hide start screen and start AR
          startScreen.style.display = 'none';
          await mindarThree.start();

          // Render loop
          renderer.setAnimationLoop(() => {
            renderer.render(scene, camera);
          });

        } catch(e) {
          showStatus('AR failed to start: ' + e.message);
          btn.disabled = false;
          startScreen.style.display = 'flex';
        }
      });
    </script>
  </body>
</html>
