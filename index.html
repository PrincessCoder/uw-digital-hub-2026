<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; }
      #start-screen {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: black;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        gap: 30px;
      }
      #start-screen h1 {
        color: white;
        font-family: sans-serif;
        font-size: 22px;
        text-align: center;
        padding: 0 40px;
        font-weight: 300;
      }
      #start-btn {
        padding: 18px 48px;
        font-size: 18px;
        background: white;
        color: black;
        border: none;
        border-radius: 50px;
        font-family: sans-serif;
        cursor: pointer;
      }
      #status {
        color: rgba(255,255,255,0.7);
        font-family: sans-serif;
        font-size: 14px;
        text-align: center;
        padding: 0 40px;
        min-height: 40px;
      }
    </style>
  </head>
  <body>

    <a-scene
      mindar-image="imageTargetSrc: targets/artwork.mind; autoStart: false;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <img id="artwork" src="assets/artwork_target.png" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane
          src="#artwork"
          position="0 0 0"
          height="1"
          width="1"
          material="transparent: true; alphaTest: 0.1">
        </a-plane>
      </a-entity>

    </a-scene>

    <div id="start-screen">
      <h1>Point your camera at the artwork to begin</h1>
      <button id="start-btn">Tap to Begin</button>
      <p id="status"> </p>
    </div>

    <script>
      const btn = document.getElementById('start-btn');
      const statusEl = document.getElementById('status');
      const startScreen = document.getElementById('start-screen');

      function showStatus(msg) {
        statusEl.textContent = msg;
      }

      btn.addEventListener('click', async () => {
        btn.disabled = true;
        showStatus('Requesting camera...');

        // Explicitly request camera permission from user gesture
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' }
          });
          stream.getTracks().forEach(t => t.stop());
        } catch(e) {
          showStatus('Camera denied. Go to Settings → Safari → Camera → Allow, then retry.');
          btn.disabled = false;
          return;
        }

        showStatus('Starting AR...');

        // Wait for A-Frame scene to be ready then start MindAR
        const scene = document.querySelector('a-scene');

        const tryStart = () => {
          const mindar = scene.components && scene.components['mindar-image'];
          if (mindar && typeof mindar.startAR === 'function') {
            startScreen.style.display = 'none';
            mindar.startAR();
          } else {
            showStatus('Loading... please wait');
            setTimeout(tryStart, 500);
          }
        };

        if (scene.hasLoaded) {
          tryStart();
        } else {
          scene.addEventListener('loaded', tryStart);
        }
      });
    </script>

  </body>
</html>
