<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body { margin: 0; overflow: hidden; }
      #start-screen {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: black;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 999;
      }
      #start-button {
        padding: 20px 40px;
        font-size: 22px;
        background: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin-top: 20px;
      }
      #start-screen p {
        color: white;
        font-family: sans-serif;
        font-size: 16px;
        text-align: center;
        padding: 0 40px;
      }
    </style>
  </head>
  <body>

    <div id="start-screen">
      <p>Point your camera at the artwork to begin the AR experience</p>
      <button id="start-button">Tap to Begin</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js">
    </script>

    <script>
      document.getElementById('start-button').addEventListener('click', async function() {
        document.getElementById('start-screen').style.display = 'none';

        // Request camera permission explicitly first
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: true });
          stream.getTracks().forEach(track => track.stop());
        } catch(e) {
          alert('Camera access is required for this experience. Please allow camera access and try again.');
          document.getElementById('start-screen').style.display = 'flex';
          return;
        }

        // Now build and inject the A-Frame scene dynamically
        const scene = document.createElement('a-scene');
        scene.setAttribute('mindar-image', 'imageTargetSrc: targets/artwork.mind;');
        scene.setAttribute('color-space', 'sRGB');
        scene.setAttribute('renderer', 'colorManagement: true, physicallyCorrectLights');
        scene.setAttribute('vr-mode-ui', 'enabled: false');
        scene.setAttribute('device-orientation-permission-ui', 'enabled: false');

        const assets = document.createElement('a-assets');
        const img = document.createElement('img');
        img.id = 'artwork';
        img.src = 'assets/artwork_target.png';
        assets.appendChild(img);

        const camera = document.createElement('a-camera');
        camera.setAttribute('position', '0 0 0');
        camera.setAttribute('look-controls', 'enabled: false');

        const entity = document.createElement('a-entity');
        entity.setAttribute('mindar-image-target', 'targetIndex: 0');

        const plane = document.createElement('a-plane');
        plane.setAttribute('src', '#artwork');
        plane.setAttribute('position', '0 0 0');
        plane.setAttribute('height', '0.5');
        plane.setAttribute('width', '0.5');
        plane.setAttribute('material', 'transparent: true; alphaTest: 0.1');

        entity.appendChild(plane);
        scene.appendChild(assets);
        scene.appendChild(camera);
        scene.appendChild(entity);
        document.body.appendChild(scene);
      });
    </script>

  </body>
</html>
