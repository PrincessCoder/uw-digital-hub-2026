<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js">
    </script>
    <style>
      #start-screen {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: black;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999;
      }
      #start-button {
        padding: 20px 40px;
        font-size: 22px;
        background: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <div id="start-screen">
      <button id="start-button">Tap to Begin</button>
    </div>

    <a-scene
      mindar-image="imageTargetSrc: targets/artwork.mind; autoStart: false;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <img id="artwork" src="assets/artwork_target.png" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
      <a-plane
  src="#artwork"
  position="0 0 0"
  height="0.2"
  width="0.2"
  material="transparent: true; alphaTest: 0.1">
</a-plane>
      </a-entity>

    </a-scene>

    <script>
      document.getElementById('start-button').addEventListener('click', function() {
        document.getElementById('start-screen').style.display = 'none';
        const scene = document.querySelector('a-scene');
        scene.components['mindar-image'].startAR();
      });
    </script>

  </body>
</html>
